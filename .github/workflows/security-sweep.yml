name: Security Sweep (juggler)

# Whole-repo deterministic security sweep for juggler — async/scheduled layer complementing the
# per-leg diff-scoped scanners in elmo/telly (scanner-wiring W1/W2). Free OSS. REPORTS SARIF to
# the Security tab; soft-fail on this baseline. NOT a per-leg gate (Oscar is, per CLAUDE.md).
# Hardening to fail-on-new-finding is TRACKED: ROADMAP 999.381 (scanner-wiring CI hardening).
# Custom rules still owed (tracked 999.381): payment webhook-signature; auth jose alg-allowlist.

on:
  push: { branches: [main] }
  schedule:
    - cron: '23 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy — dependency CVEs + secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0 (SHA-pinned; @0.28.0 tag does not exist — tags are v-prefixed)
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy.sarif
          exit-code: '0'
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy.sarif, category: trivy }

  semgrep:
    name: Semgrep — SAST (container, SARIF)
    runs-on: ubuntu-latest
    container: { image: semgrep/semgrep:latest }
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config p/default --config p/owasp-top-ten --sarif --output semgrep.sarif || true
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: semgrep.sarif, category: semgrep }

  node-checks:
    name: npm audit + Stryker (if wired)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      # NOTE: services whose package.json lives in a *-backend/ subdir must set
      # working-directory or a matrix here (tracked 999.381 per-service tuning).
      - run: npm ci || npm install || true
      - run: npm audit --audit-level=high || true
      # juggler-backend production-dependency audit (999.629). package.json lives in
      # juggler-backend/, so the root npm audit above does not cover it. --omit=dev is
      # the modern equivalent of the deprecated --production; --audit-level=high skips
      # low-sev noise. Soft-fail (|| true) with visible output to match sibling steps —
      # this is a reporting baseline, not a gate (Oscar is the gate, per CLAUDE.md).
      - name: npm audit (juggler-backend, production deps)
        working-directory: juggler-backend
        run: npm audit --omit=dev --audit-level=high || true
      - name: Stryker full mutation (only if a stryker config exists)
        run: |
          if ls stryker.conf.* .stryker.conf.* 2>/dev/null | head -1 | grep -q .; then
            npx stryker run || true
          else
            echo "stryker: not-wired in juggler — add stryker.conf.json (tracked 999.381)"
          fi

  gitleaks:
    name: Gitleaks — secrets (binary, license-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Run gitleaks (binary — avoids gitleaks-action org-license requirement)
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 0             --report-format sarif --report-path gitleaks.sarif || true
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: gitleaks.sarif, category: gitleaks }
