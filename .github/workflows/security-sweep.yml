name: Security Sweep (juggler)

# Whole-repo deterministic security sweep for juggler — the async/scheduled layer that
# complements the per-leg diff-scoped scanners in elmo/telly (scanner-wiring W1/W2).
# Free OSS only. REPORTS (SARIF → Security tab); soft-fail on this first baseline so
# pre-existing findings do not red-wall CI. NOT a per-leg gate (Oscar is, per CLAUDE.md).
# Hardening to fail-on-new-finding + wiring a per-service stryker.conf are tracked follow-ups.

on:
  push:
    branches: [main]
  schedule:
    - cron: '23 7 * * *'   # daily — catch newly-disclosed CVEs on unchanged deps
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  deps-sast-secrets:
    name: trivy + semgrep + gitleaks + npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Trivy (dependency CVEs + secrets)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy.sarif
          exit-code: '0'
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy.sarif, category: trivy }

      - name: Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/owasp-top-ten
        continue-on-error: true

      - name: Gitleaks (secrets, full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: npm audit (dependency CVEs)
        run: npm audit --audit-level=high || true

      - name: Stryker full mutation run (only if a stryker config exists)
        run: |
          if ls stryker.conf.* .stryker.conf.* 2>/dev/null | head -1 | grep -q .; then
            npx stryker run || true
          else
            echo "stryker: not-wired in juggler — add stryker.conf.json to enable the full mutation sweep (scanner-wiring follow-up)"
          fi
