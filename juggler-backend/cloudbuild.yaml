steps:
  # Copy auth-client into build context
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cp -r /workspace/../auth-service/shared /workspace/auth-client 2>/dev/null || \
        mkdir -p /workspace/auth-client && \
        echo '{"name":"auth-client","version":"1.0.0","main":"auth-client.js","dependencies":{"jose":"^5.2.0"}}' > /workspace/auth-client/package.json && \
        cat > /workspace/auth-client/auth-client.js << 'SCRIPT'
        const { createRemoteJWKSet, jwtVerify } = require('jose');
        let _jwks = null;
        function getJWKS() {
          if (!_jwks) {
            const jwksUrl = process.env.AUTH_JWKS_URL || 'http://localhost:5010/.well-known/jwks.json';
            _jwks = createRemoteJWKSet(new URL(jwksUrl));
          }
          return _jwks;
        }
        function authenticateJWT(appSlug) {
          return async (req, res, next) => {
            const header = req.headers.authorization;
            if (!header || !header.startsWith('Bearer ')) {
              return res.status(401).json({ error: 'Authentication required' });
            }
            try {
              const { payload } = await jwtVerify(header.substring(7), getJWKS(), { issuer: 'raike-auth' });
              if (appSlug && !payload.apps?.includes(appSlug)) {
                return res.status(403).json({ error: 'No access to this application' });
              }
              req.user = { id: payload.sub, email: payload.email, name: payload.name };
              req.auth = { roles: payload.roles || [], apps: payload.apps || [], plans: payload.plans || {}, jti: payload.jti, method: 'jwt' };
              next();
            } catch (err) {
              if (err.code === 'ERR_JWT_EXPIRED') {
                return res.status(401).json({ error: 'Token expired', code: 'TOKEN_EXPIRED' });
              }
              return res.status(401).json({ error: 'Invalid token' });
            }
          };
        }
        function optionalJWT(appSlug) {
          return async (req, res, next) => {
            const header = req.headers.authorization;
            if (!header || !header.startsWith('Bearer ')) return next();
            try {
              const { payload } = await jwtVerify(header.substring(7), getJWKS(), { issuer: 'raike-auth' });
              if (appSlug && !payload.apps?.includes(appSlug)) return next();
              req.user = { id: payload.sub, email: payload.email, name: payload.name };
              req.auth = { roles: payload.roles || [], apps: payload.apps || [], plans: payload.plans || {} };
            } catch (err) {}
            next();
          };
        }
        function requireAdmin(req, res, next) {
          if (!req.auth?.roles?.includes('admin')) return res.status(403).json({ error: 'Admin access required' });
          next();
        }
        function requirePlan(appSlug, planSlugs) {
          const plans = Array.isArray(planSlugs) ? planSlugs : [planSlugs];
          return (req, res, next) => {
            const userPlan = req.auth?.plans?.[appSlug];
            if (!userPlan || !plans.includes(userPlan)) return res.status(403).json({ error: 'Subscription required', required_plans: plans });
            next();
          };
        }
        module.exports = { authenticateJWT, optionalJWT, requireAdmin, requirePlan };
        SCRIPT

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'juggler-backend/Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/juggler-backend'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/juggler-backend'
