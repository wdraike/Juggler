steps:
  # Build Docker image (auth-client/ copied into build context by deploy script)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'juggler-backend/Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/juggler-backend'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/juggler-backend'
