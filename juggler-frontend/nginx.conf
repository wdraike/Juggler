server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect Cloud Run raw URL to public domain
    if ($host ~* "\.a\.run\.app$") {
        return 301 https://strivers.raikegroup.com$request_uri;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Proxy API requests to backend Cloud Run service
    location /api/ {
        resolver 8.8.8.8 valid=30s;
        set $backend "${BACKEND_URL}";
        proxy_pass $backend$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host juggler-backend-1057418149210.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    # Proxy MCP, OAuth, and well-known to backend
    location /mcp {
        resolver 8.8.8.8 valid=30s;
        set $backend "${BACKEND_URL}";
        proxy_pass $backend$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host juggler-backend-1057418149210.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    location /oauth/ {
        resolver 8.8.8.8 valid=30s;
        set $backend "${BACKEND_URL}";
        proxy_pass $backend$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host juggler-backend-1057418149210.us-central1.run.app;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /.well-known/ {
        resolver 8.8.8.8 valid=30s;
        set $backend "${BACKEND_URL}";
        proxy_pass $backend$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host juggler-backend-1057418149210.us-central1.run.app;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Cache static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker - no cache, force update
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # SPA fallback - never cache HTML so deploys take effect immediately
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # Health check
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
