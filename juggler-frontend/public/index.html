<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1A2B4A" />
  <meta name="description" content="Raike & Sons — old school hustle, new school AI" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
  <title>Raike & Sons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-navy: #1A2B4A;
      --brand-navy-light: #2E4A7A;
      --brand-gold: #C8942A;
      --brand-gold-light: #E8C878;
      --brand-copper: #9E6B3B;
      --brand-parchment: #F5F0E8;
      --brand-parchment-dark: #E8E0D0;
      --brand-cream: #FDFAF5;
      --brand-charcoal: #2C2B28;
      --brand-charcoal-muted: #5C5A55;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; min-width: 0; }
    html, body, #root { overflow-x: hidden; max-width: 100vw; width: 100%; }
    input, select, textarea, button { max-width: 100%; }
    body { font-family: 'Inter', 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    [draggable] {
      -webkit-user-drag: element;
      -webkit-touch-callout: none;
    }
  </style>
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      caches.keys().then(function(names) {
        names.forEach(function(name) { caches.delete(name); });
      });
    }
  </script>
  <div id="root"></div>
</body>
</html>
