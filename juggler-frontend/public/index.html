<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- 999.1243: dark is the default theme, so the static theme-color is Deep Navy
       (brand guide "Theme Color Meta"); AppLayout updates it on theme change. -->
  <meta name="theme-color" content="#0F1520" />
  <meta name="description" content="Raike & Sons — old school hustle, new school AI" />
  <!-- StriveRS by Raike & Sons favicon — favicon-simple.svg is the primary (clean "R" reads at 16px);
       .ico is the legacy fallback; iOS needs a PNG touch icon (it does not render SVG). -->
  <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon-simple.svg" />
  <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>StriveRS by Raike & Sons — AI Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-navy: #1A2B4A;
      --brand-navy-light: #2E4A7A;
      --brand-gold: #C8942A;
      --brand-gold-light: #E8C878;
      --brand-copper: #9E6B3B;
      --brand-parchment: #F5F0E8;
      --brand-parchment-dark: #E8E0D0;
      --brand-cream: #FDFAF5;
      --brand-charcoal: #2C2B28;
      --brand-charcoal-muted: #5C5A55;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; min-width: 0; }
    html, body, #root { overflow-x: hidden; max-width: 100vw; width: 100%; }
    input, select, textarea, button { max-width: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    [draggable] {
      -webkit-user-drag: element;
      -webkit-touch-callout: none;
    }
    :focus-visible {
      outline: 2px solid #C8942A;
      outline-offset: 2px;
    }
    button:focus:not(:focus-visible),
    a:focus:not(:focus-visible),
    input:focus:not(:focus-visible),
    select:focus:not(:focus-visible),
    textarea:focus:not(:focus-visible) {
      outline: none;
    }
  </style>
</head>
<body>
  <!--
    Service worker registration is handled in src/serviceWorkerRegistration.js
    (production-only, fail-silent). The previous inline kill-switch that
    unregistered all SWs and cleared all caches on every load was removed for
    backlog 999.258 — it would have immediately killed the new conservative SW.
  -->
  <div id="root"></div>
</body>
</html>
