<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline — StriveRS by Raike &amp; Sons</title>
  <style>
    :root {
      --brand-navy: #1A2B4A;
      --brand-gold: #C8942A;
      --brand-parchment: #F5F0E8;
      --brand-charcoal-muted: #5C5A55;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--brand-navy);
      color: var(--brand-parchment);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .panel { max-width: 28rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: var(--brand-gold); }
    p { font-size: 0.95rem; line-height: 1.5; opacity: 0.85; margin-bottom: 1.5rem; }
    button {
      font: inherit;
      font-weight: 600;
      color: var(--brand-navy);
      background: var(--brand-gold);
      border: none;
      border-radius: 0.5rem;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div class="panel">
    <h1>You're offline</h1>
    <p>
      StriveRS needs a connection to load your tasks and calendar. Your data is
      safe — reconnect and try again.
    </p>
    <button type="button" onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
